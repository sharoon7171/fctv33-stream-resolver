<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stream Resolver</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{min-height:100%}
      body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b0d12;color:#e8eaef}
      button,input,textarea{font:inherit}
      button{cursor:pointer}
      .page{min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}
      .panel{width:100%;max-width:880px;background:#151821;border:1px solid #242833;border-radius:12px;overflow:hidden}
      .top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid #242833}
      .top h1{font-size:15px;font-weight:600;letter-spacing:-.01em}
      .top p{font-size:12px;color:#8b93a7;text-align:right;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .form{padding:20px}
      .hint{margin-top:10px;font-size:12px;line-height:1.5;color:#8b93a7}
      .hint a{color:#ffbd0f;text-decoration:none}
      .hint a:hover{text-decoration:underline}
      .output{display:grid;gap:16px;padding:0 20px 20px;border-top:1px solid #242833;padding-top:20px}
      .row{display:flex;gap:10px;align-items:stretch}
      .row input{flex:1;min-width:0}
      .player{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;overflow:hidden;border:1px solid #2f3545}
      .player video{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
      .field{display:flex;flex-direction:column;gap:8px}
      .field-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
      .field span{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#8b93a7}
      .field input,.field textarea{width:100%;padding:11px 12px;border-radius:8px;border:1px solid #2f3545;background:#0f1117;color:#e8eaef;font-size:13px}
      .field textarea{resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.45}
      .field textarea[readonly]{color:#c5cad6}
      .btn{padding:11px 16px;border-radius:8px;border:1px solid #2f3545;background:#1c2130;color:#e8eaef;font-size:13px;white-space:nowrap;flex-shrink:0}
      .btn-primary{background:#ffbd0f;border-color:#ffbd0f;color:#151821;font-weight:600}
      .btn:disabled{opacity:.45;cursor:not-allowed}
      @media(max-width:640px){
        .page{padding:0;align-items:stretch}
        .panel{min-height:100dvh;border-radius:0;border-left:0;border-right:0}
        .top{flex-direction:column;align-items:flex-start;gap:4px}
        .top p{text-align:left;white-space:normal}
        .row{flex-direction:column}
        .btn-primary{width:100%}
      }
    </style>
  </head>
  <body>
    <main class="page">
      <article class="panel">
        <header class="top">
          <h1>Stream Resolver</h1>
          <p id="status">Ready</p>
        </header>
        <section class="form">
          <label class="field" for="pageUrl">
            <span>Match page URL</span>
            <div class="row">
              <input
                id="pageUrl"
                type="url"
                spellcheck="false"
                placeholder="https://www.fctv33hd.rest/en/football/…-123456.html"
              />
              <button id="resolveBtn" class="btn btn-primary" type="button">Resolve</button>
            </div>
          </label>
          <p class="hint">
            Open
            <a href="https://www.fctv33hd.rest/" target="_blank" rel="noopener noreferrer">fctv33hd.rest</a>,
            pick <strong>Live</strong> or a sport, open a match, then paste that page URL here.
          </p>
        </section>
        <section class="output" id="results" hidden>
          <div class="player">
            <video id="player" controls playsinline></video>
          </div>
          <label class="field" for="playableUrl">
            <div class="field-head">
              <span>Playable link</span>
              <button class="btn" type="button" data-copy="playableUrl">Copy</button>
            </div>
            <textarea id="playableUrl" readonly spellcheck="false" rows="2"></textarea>
          </label>
        </section>
      </article>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.20/dist/hls.min.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
